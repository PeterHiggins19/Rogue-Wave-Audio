name: Build Documents

on:
  workflow_dispatch:
    inputs:
      document:
        description: 'Builder script path (e.g., src/builders/build_organic_digital_paper_v2_6.js)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build document
        run: node ${{ github.event.inputs.document }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-document
          path: '*.docx'
